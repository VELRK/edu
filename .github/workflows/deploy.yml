name: Deploy to Hostinger — EDU

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via PHP webhook
        run: |
          RESPONSE=$(curl -sf --max-time 60 \
            "https://superfinelabels.in/edu/hook.php?token=${{ secrets.DEPLOY_TOKEN }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || { echo "Deploy failed"; exit 1; }
