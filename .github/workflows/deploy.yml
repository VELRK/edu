name: Auto Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy via webhook
        run: |
          RESPONSE=$(curl -sf "https://superfinelabels.in/edu/hook.php?token=${{ secrets.DEPLOY_TOKEN }}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || { echo "Deploy failed"; exit 1; }
