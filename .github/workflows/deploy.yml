name: Deploy to cPanel

on:
  push:
    branches:
      - main          # auto-deploy on every push to main
  workflow_dispatch:  # manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Write production .env from GitHub Secrets ──────────────────────
      - name: Write production .env
        run: |
          cat > .env <<EOF
          CI_ENV=production
          DB_HOST=${{ secrets.DB_HOST }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ secrets.DB_NAME }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

      # ── 3. Upload via FTP ─────────────────────────────────────────────────
      # React dist/ is pre-built locally and committed — no Node needed here
      - name: Upload to cPanel via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /public_html/edu/
          local-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            react-app/src/**
            react-app/public/**
            react-app/vite.config.js
            react-app/package*.json
            react-app/eslint.config.*
            react-app/.env
            deploy.sh
            .deploy.env
