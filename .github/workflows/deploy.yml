name: Auto Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Write production .env into workspace
        run: |
          printf "CI_ENV=production\nDB_HOST=${{ secrets.DB_HOST }}\nDB_USER=${{ secrets.DB_USER }}\nDB_PASSWORD=${{ secrets.DB_PASSWORD }}\nDB_NAME=${{ secrets.DB_NAME }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\n" > .env

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          cat > /tmp/deploy.lftp << EOF
          set ftp:ssl-allow no
          set ssl:verify-certificate no
          open -u $FTP_USER,$FTP_PASS $FTP_HOST
          mirror --reverse --delete --verbose --exclude-glob .git/ --exclude-glob .deploy.env --exclude-glob deploy.sh --exclude-glob react-app/node_modules/ --exclude-glob react-app/src/ --exclude-glob application/logs/ --exclude-glob application/cache/ . /public_html/edu
          rm -f /public_html/edu/.migrated
          rm -f /public_html/edu/.migrated_v2
          bye
          EOF

          lftp -f /tmp/deploy.lftp
