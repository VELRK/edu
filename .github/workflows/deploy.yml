name: Auto Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate FTP secrets
        run: |
          [ -n "${{ secrets.FTP_HOST }}" ] || { echo "::error::FTP_HOST secret not set in GitHub → Settings → Secrets"; exit 1; }
          [ -n "${{ secrets.FTP_USER }}" ] || { echo "::error::FTP_USER secret not set in GitHub → Settings → Secrets"; exit 1; }
          [ -n "${{ secrets.FTP_PASS }}" ] || { echo "::error::FTP_PASS secret not set in GitHub → Settings → Secrets"; exit 1; }
          echo "FTP secrets OK"

      - name: Write production .env
        run: |
          printf "CI_ENV=production\nDB_HOST=${{ secrets.DB_HOST }}\nDB_USER=${{ secrets.DB_USER }}\nDB_PASSWORD=${{ secrets.DB_PASSWORD }}\nDB_NAME=${{ secrets.DB_NAME }}\nJWT_SECRET=${{ secrets.JWT_SECRET }}\n" > .env

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Upload files via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          echo "set ftp:ssl-allow no"                          > /tmp/deploy.lftp
          echo "set ssl:verify-certificate no"                >> /tmp/deploy.lftp
          echo "open -u $FTP_USER,$FTP_PASS $FTP_HOST"       >> /tmp/deploy.lftp
          echo "mirror --reverse --delete --verbose \
            --exclude-glob .git/ \
            --exclude-glob .deploy.env \
            --exclude-glob deploy.sh \
            --exclude-glob react-app/node_modules/ \
            --exclude-glob react-app/src/ \
            --exclude-glob application/logs/ \
            --exclude-glob application/cache/ \
            . /public_html/edu"                               >> /tmp/deploy.lftp
          echo "rm -f /public_html/edu/.migrated"            >> /tmp/deploy.lftp
          echo "rm -f /public_html/edu/.migrated_v2"         >> /tmp/deploy.lftp
          echo "bye"                                          >> /tmp/deploy.lftp
          echo "--- lftp script ---"
          cat /tmp/deploy.lftp
          echo "--- running lftp ---"
          lftp -f /tmp/deploy.lftp
