name: Auto Deploy Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Deployment is handled by Hostinger Git Auto-Deploy webhook.
# hPanel → Advanced → Git → connected to this repo (branch: main)
# Push to main → GitHub webhook → Hostinger pulls internally.
# No SSH/FTP needed from GitHub Actions.

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy triggered
        run: echo "Push received. Hostinger Git webhook will auto-deploy."
